<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rings - Workout Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen pb-20">

    <!-- Header -->
    <header class="p-6 text-center border-b border-slate-800">
        <h1 class="text-3xl font-bold tracking-tighter text-blue-400">RINGS</h1>
    </header>

    <!-- WORKOUT TAB -->
    <div id="workout" class="tab-content active p-4">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-semibold">My Routines</h2>
            <button onclick="openModal('routineModal')" class="bg-blue-600 px-4 py-2 rounded-full text-sm font-bold">+ New Routine</button>
        </div>
        
        <div id="routinesList" class="space-y-4">
            <!-- Routines will be injected here -->
        </div>
    </div>

    <!-- REPORTS TAB -->
    <div id="reports" class="tab-content p-4">
        <h2 class="text-xl font-semibold mb-6">Performance Reports</h2>
        
        <div class="grid grid-cols-1 gap-4 mb-8">
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                <p class="text-slate-400 text-sm">Past 30 Days Duration</p>
                <h3 id="totalTime" class="text-4xl font-bold text-blue-400">0m</h3>
            </div>
        </div>

        <h3 class="text-lg font-medium mb-4 text-slate-300">Personal Records (PRs)</h3>
        <div id="prList" class="space-y-2">
            <!-- PRs will be injected here -->
        </div>
    </div>

    <!-- ACTIVE WORKOUT SCREEN (Overlay) -->
    <div id="activeWorkoutScreen" class="hidden fixed inset-0 bg-slate-900 z-50 p-4 overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 id="activeRoutineName" class="text-2xl font-bold">Workout</h2>
            <div id="timer" class="text-2xl font-mono text-blue-400">00:00</div>
        </div>
        <div id="activeExercisesList" class="space-y-6"></div>
        <button onclick="finishWorkout()" class="w-full mt-8 bg-green-600 py-4 rounded-2xl font-bold text-lg">Finish Workout</button>
    </div>

    <!-- CREATE ROUTINE MODAL -->
    <div id="routineModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
        <div class="bg-slate-800 w-full max-w-md p-6 rounded-3xl border border-slate-700">
            <h3 class="text-xl font-bold mb-4">Create Routine</h3>
            <input id="routineName" type="text" placeholder="Routine Name (e.g. Leg Day)" class="w-full p-3 rounded-lg bg-slate-700 mb-4 outline-none border border-slate-600">
            
            <div id="exerciseInputs" class="space-y-3 mb-4 max-h-60 overflow-y-auto">
                <!-- Exercise rows added here -->
            </div>
            
            <button onclick="addExerciseField()" class="w-full py-2 text-blue-400 text-sm mb-6">+ Add Exercise</button>
            
            <div class="flex gap-3">
                <button onclick="closeModal('routineModal')" class="flex-1 py-3 rounded-xl bg-slate-700">Cancel</button>
                <button onclick="saveRoutine()" class="flex-1 py-3 rounded-xl bg-blue-600 font-bold">Save Routine</button>
            </div>
        </div>
    </div>

    <!-- BOTTOM NAVIGATION -->
    <nav class="fixed bottom-0 left-0 right-0 bg-slate-800 border-t border-slate-700 flex justify-around p-3 pb-6">
        <button onclick="showTab('workout')" class="flex flex-col items-center text-blue-400 transition-colors" id="nav-workout">
            <span class="text-xs mt-1 font-medium">Workout</span>
        </button>
        <button onclick="showTab('reports')" class="flex flex-col items-center text-slate-400 transition-colors" id="nav-reports">
            <span class="text-xs mt-1 font-medium">Reports</span>
        </button>
    </nav>

    <script>
        // --- STATE MANAGEMENT ---
        let state = {
            routines: JSON.parse(localStorage.getItem('rings_routines')) || [],
            logs: JSON.parse(localStorage.getItem('rings_logs')) || [],
            prs: JSON.parse(localStorage.getItem('rings_prs')) || {}
        };

        let activeTimer = null;
        let secondsElapsed = 0;
        let currentRoutineId = null;

        function saveData() {
            localStorage.setItem('rings_routines', JSON.stringify(state.routines));
            localStorage.setItem('rings_logs', JSON.stringify(state.logs));
            localStorage.setItem('rings_prs', JSON.stringify(state.prs));
        }

        // --- NAVIGATION ---
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            
            document.getElementById('nav-workout').classList.replace('text-blue-400', 'text-slate-400');
            document.getElementById('nav-reports').classList.replace('text-blue-400', 'text-slate-400');
            document.getElementById(`nav-${tabId}`).classList.replace('text-slate-400', 'text-blue-400');
            
            if(tabId === 'reports') renderReports();
            if(tabId === 'workout') renderRoutines();
        }

        function openModal(id) { 
            document.getElementById(id).classList.remove('hidden'); 
            if(id === 'routineModal') {
                document.getElementById('exerciseInputs').innerHTML = '';
                addExerciseField();
            }
        }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // --- ROUTINE LOGIC ---
        function addExerciseField() {
            const div = document.createElement('div');
            div.className = "flex gap-2 mb-2 exercise-row";
            div.innerHTML = `
                <input type="text" placeholder="Exercise" class="flex-1 p-2 rounded bg-slate-700 text-sm outline-none">
                <input type="number" placeholder="Sets" class="w-16 p-2 rounded bg-slate-700 text-sm outline-none">
                <input type="number" placeholder="Reps" class="w-16 p-2 rounded bg-slate-700 text-sm outline-none">
            `;
            document.getElementById('exerciseInputs').appendChild(div);
        }

        function saveRoutine() {
            const name = document.getElementById('routineName').value;
            const rows = document.querySelectorAll('.exercise-row');
            const exercises = [];

            rows.forEach(row => {
                const inputs = row.querySelectorAll('input');
                if(inputs[0].value) {
                    exercises.push({
                        name: inputs[0].value,
                        sets: inputs[1].value || 0,
                        reps: inputs[2].value || 0,
                        weight: 0
                    });
                }
            });

            if(!name) return alert("Please name your routine");

            state.routines.push({ id: Date.now(), name, exercises });
            saveData();
            closeModal('routineModal');
            renderRoutines();
        }

        function deleteRoutine(id) {
            state.routines = state.routines.filter(r => r.id !== id);
            saveData();
            renderRoutines();
        }

        function renderRoutines() {
            const list = document.getElementById('routinesList');
            list.innerHTML = state.routines.length ? '' : '<p class="text-center text-slate-500 mt-10">No routines created yet.</p>';
            
            state.routines.forEach(r => {
                list.innerHTML += `
                    <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700 flex justify-between items-center">
                        <div>
                            <h3 class="font-bold text-lg">${r.name}</h3>
                            <p class="text-slate-400 text-xs">${r.exercises.length} Exercises</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="startWorkout(${r.id})" class="bg-blue-600 p-2 px-4 rounded-lg text-sm font-bold">Start</button>
                            <button onclick="deleteRoutine(${r.id})" class="bg-red-900/30 text-red-400 p-2 px-4 rounded-lg text-sm">Delete</button>
                        </div>
                    </div>
                `;
            });
        }

        // --- ACTIVE WORKOUT LOGIC ---
        function startWorkout(id) {
            const routine = state.routines.find(r => r.id === id);
            currentRoutineId = id;
            document.getElementById('activeRoutineName').innerText = routine.name;
            
            const exList = document.getElementById('activeExercisesList');
            exList.innerHTML = '';
            
            routine.exercises.forEach((ex, idx) => {
                exList.innerHTML += `
                    <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700">
                        <h4 class="font-bold mb-3 text-blue-300">${ex.name}</h4>
                        <div class="grid grid-cols-3 gap-2">
                            <div>
                                <label class="text-[10px] text-slate-400 uppercase">Sets</label>
                                <input type="number" data-idx="${idx}" data-field="sets" value="${ex.sets}" class="w-full p-2 rounded bg-slate-700 outline-none workout-input">
                            </div>
                            <div>
                                <label class="text-[10px] text-slate-400 uppercase">Reps</label>
                                <input type="number" data-idx="${idx}" data-field="reps" value="${ex.reps}" class="w-full p-2 rounded bg-slate-700 outline-none workout-input">
                            </div>
                            <div>
                                <label class="text-[10px] text-slate-400 uppercase">Weight (kg)</label>
                                <input type="number" data-idx="${idx}" data-field="weight" value="0" class="w-full p-2 rounded bg-slate-700 outline-none workout-input">
                            </div>
                        </div>
                    </div>
                `;
            });

            document.getElementById('activeWorkoutScreen').classList.remove('hidden');
            startTimer();
        }

        function startTimer() {
            secondsElapsed = 0;
            clearInterval(activeTimer);
            activeTimer = setInterval(() => {
                secondsElapsed++;
                const mins = Math.floor(secondsElapsed / 60).toString().padStart(2, '0');
                const secs = (secondsElapsed % 60).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `${mins}:${secs}`;
            }, 1000);
        }

        function finishWorkout() {
            clearInterval(activeTimer);
            const routine = state.routines.find(r => r.id === currentRoutineId);
            const inputs = document.querySelectorAll('.workout-input');
            const results = JSON.parse(JSON.stringify(routine.exercises));

            inputs.forEach(input => {
                const idx = input.dataset.idx;
                const field = input.dataset.field;
                results[idx][field] = parseFloat(input.value) || 0;
                
                // PR Logic
                const exName = results[idx].name;
                if(!state.prs[exName]) state.prs[exName] = { weight: 0, reps: 0 };
                
                if(field === 'weight' && input.value > state.prs[exName].weight) {
                    state.prs[exName].weight = parseFloat(input.value);
                }
                if(field === 'reps' && input.value > state.prs[exName].reps) {
                    state.prs[exName].reps = parseFloat(input.value);
                }
            });

            state.logs.push({
                date: new Date().toISOString(),
                duration: secondsElapsed,
                routineId: currentRoutineId
            });

            saveData();
            document.getElementById('activeWorkoutScreen').classList.add('hidden');
            showTab('reports');
        }

        // --- REPORTS LOGIC ---
        function renderReports() {
            // Calculate Monthly Time
            const oneMonthAgo = new Date();
            oneMonthAgo.setDate(oneMonthAgo.getDate() - 30);
            
            const monthlySeconds = state.logs
                .filter(log => new Date(log.date) > oneMonthAgo)
                .reduce((acc, curr) => acc + curr.duration, 0);
            
            const totalMins = Math.floor(monthlySeconds / 60);
            document.getElementById('totalTime').innerText = `${totalMins}m`;

            // Render PRs
            const prList = document.getElementById('prList');
            prList.innerHTML = '';
            for(const [name, stats] of Object.entries(state.prs)) {
                prList.innerHTML += `
                    <div class="flex justify-between p-3 bg-slate-800 rounded-lg border border-slate-700">
                        <span class="font-medium">${name}</span>
                        <span class="text-blue-400 font-bold">${stats.weight}kg / ${stats.reps} reps</span>
                    </div>
                `;
            }
        }

        // Init
        renderRoutines();
    </script>
</body>
</html>
