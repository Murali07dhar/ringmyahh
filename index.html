<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rings - Workout Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen pb-24">

    <!-- Header -->
    <header class="p-6 text-center border-b border-slate-900 bg-slate-950 sticky top-0 z-40">
        <h1 class="text-3xl font-black tracking-tighter text-blue-500">RINGS</h1>
    </header>

    <!-- WORKOUT TAB -->
    <div id="workout" class="tab-content active p-4">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold">My Routines</h2>
            <button onclick="openModal('routineModal')" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-full text-sm font-bold transition-all">+ New Routine</button>
        </div>
        
        <div id="routinesList" class="space-y-4">
            <!-- Routines injected here -->
        </div>
    </div>

    <!-- REPORTS TAB -->
    <div id="reports" class="tab-content p-4">
        <h2 class="text-xl font-bold mb-6">Performance Reports</h2>
        
        <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 mb-8 shadow-xl">
            <p class="text-slate-400 text-xs uppercase tracking-widest font-semibold">Past 30 Days Duration</p>
            <h3 id="totalTime" class="text-5xl font-black text-blue-500 mt-1">0m</h3>
        </div>

        <h3 class="text-lg font-bold mb-4 text-slate-300">Personal Records (PRs)</h3>
        <div id="prList" class="space-y-3">
            <!-- PRs injected here -->
        </div>
    </div>

    <!-- ACTIVE WORKOUT SCREEN -->
    <div id="activeWorkoutScreen" class="hidden fixed inset-0 bg-slate-950 z-50 p-4 overflow-y-auto">
        <div class="flex justify-between items-center mb-8 sticky top-0 bg-slate-950 py-4">
            <div>
                <h2 id="activeRoutineName" class="text-2xl font-bold">Workout</h2>
                <p class="text-slate-500 text-sm">Tracking progress...</p>
            </div>
            <div id="timer" class="text-2xl font-mono font-bold text-blue-500 bg-slate-900 px-3 py-1 rounded-lg border border-slate-800">00:00</div>
        </div>

        <div id="activeExercisesList" class="space-y-6 mb-24"></div>

        <button onclick="finishWorkout()" class="fixed bottom-6 left-4 right-4 bg-blue-600 py-4 rounded-2xl font-bold text-lg shadow-2xl active:scale-95 transition-transform">Finish Workout</button>
    </div>

    <!-- ROUTINE MODAL (Used for both Create and Edit) -->
    <div id="routineModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-slate-900 w-full max-w-md p-6 rounded-3xl border border-slate-800 shadow-2xl">
            <h3 id="modalTitle" class="text-xl font-bold mb-4">Create Routine</h3>
            <input id="routineName" type="text" placeholder="Routine Name (e.g. Push Day)" class="w-full p-4 rounded-xl bg-slate-800 mb-4 outline-none border border-slate-700 focus:border-blue-500 transition-all">
            
            <p class="text-slate-400 text-xs mb-2 uppercase font-bold">Exercises</p>
            <div id="exerciseInputs" class="space-y-2 mb-4 max-h-60 overflow-y-auto">
                <!-- Exercise rows added here -->
            </div>
            
            <button onclick="addExerciseField()" class="w-full py-3 text-blue-400 text-sm font-bold mb-6 border-2 border-dashed border-slate-700 rounded-xl hover:bg-slate-800 transition-all">+ Add Exercise</button>
            
            <div class="flex gap-3">
                <button onclick="closeModal('routineModal')" class="flex-1 py-3 rounded-xl bg-slate-800 font-semibold">Cancel</button>
                <button onclick="saveRoutine()" class="flex-1 py-3 rounded-xl bg-blue-600 font-bold">Save Routine</button>
            </div>
        </div>
    </div>

    <!-- BOTTOM NAVIGATION -->
    <nav class="fixed bottom-0 left-0 right-0 bg-slate-900/80 backdrop-blur-md border-t border-slate-800 flex justify-around p-3 pb-8">
        <button onclick="showTab('workout')" class="flex flex-col items-center transition-colors" id="nav-workout">
            <span class="text-xs font-bold uppercase tracking-wider" id="txt-workout">Workout</span>
        </button>
        <button onclick="showTab('reports')" class="flex flex-col items-center transition-colors" id="nav-reports">
            <span class="text-xs font-bold uppercase tracking-wider" id="txt-reports">Reports</span>
        </button>
    </nav>

    <script>
        // --- STATE ---
        let state = {
            routines: JSON.parse(localStorage.getItem('rings_routines')) || [],
            logs: JSON.parse(localStorage.getItem('rings_logs')) || [],
            prs: JSON.parse(localStorage.getItem('rings_prs')) || {}
        };

        let activeTimer = null;
        let secondsElapsed = 0;
        let currentRoutineId = null;
        let editingRoutineId = null; // Track if we are editing
        let sessionData = [];

        function saveData() {
            localStorage.setItem('rings_routines', JSON.stringify(state.routines));
            localStorage.setItem('rings_logs', JSON.stringify(state.logs));
            localStorage.setItem('rings_prs', JSON.stringify(state.prs));
        }

        // --- UI NAVIGATION ---
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            
            const navW = document.getElementById('nav-workout');
            const navR = document.getElementById('nav-reports');
            
            if(tabId === 'workout') {
                navW.classList.add('text-blue-500'); navR.classList.remove('text-blue-500');
                renderRoutines();
            } else {
                navR.classList.add('text-blue-500'); navW.classList.remove('text-blue-500');
                renderReports();
            }
        }

        function openModal(id) { 
            editingRoutineId = null; // Reset to "Create" mode
            document.getElementById('modalTitle').innerText = "Create Routine";
            document.getElementById('routineName').value = "";
            document.getElementById('exerciseInputs').innerHTML = '';
            
            document.getElementById(id).classList.remove('hidden'); 
            addExerciseField();
        }

        function openEditModal(id) {
            editingRoutineId = id;
            const routine = state.routines.find(r => r.id === id);
            
            document.getElementById('modalTitle').innerText = "Edit Routine";
            document.getElementById('routineName').value = routine.name;
            document.getElementById('exerciseInputs').innerHTML = '';
            
            routine.exercises.forEach(ex => addExerciseField(ex.name));
            document.getElementById('routineModal').classList.remove('hidden');
        }

        function closeModal(id) { 
            document.getElementById(id).classList.add('hidden'); 
            editingRoutineId = null;
        }

        // --- ROUTINE MANAGEMENT ---
        function addExerciseField(value = "") {
            const div = document.createElement('div');
            div.className = "flex gap-2 exercise-row";
            div.innerHTML = `
                <input type="text" placeholder="Exercise Name" value="${value}" class="w-full p-3 rounded-xl bg-slate-800 text-sm outline-none border border-slate-700">
                <button onclick="this.parentElement.remove()" class="text-red-500 px-2 font-bold">✕</button>
            `;
            document.getElementById('exerciseInputs').appendChild(div);
        }

        function saveRoutine() {
            const name = document.getElementById('routineName').value;
            const rows = document.querySelectorAll('.exercise-row input');
            const exercises = [];

            rows.forEach(input => {
                if(input.value) exercises.push({ name: input.value });
            });

            if(!name) return alert("Please name your routine");

            if(editingRoutineId) {
                // UPDATE existing
                const index = state.routines.findIndex(r => r.id === editingRoutineId);
                state.routines[index] = { ...state.routines[index], name, exercises };
            } else {
                // CREATE new
                state.routines.push({ id: Date.now(), name, exercises });
            }

            saveData();
            closeModal('routineModal');
            renderRoutines();
        }

        function deleteRoutine(id) {
            if(confirm('Delete this routine?')) {
                state.routines = state.routines.filter(r => r.id !== id);
                saveData();
                renderRoutines();
            }
        }

        function renderRoutines() {
            const list = document.getElementById('routinesList');
            list.innerHTML = state.routines.length ? '' : '<p class="text-center text-slate-600 mt-10">No routines yet. Create one to get started!</p>';
            
            state.routines.forEach(r => {
                list.innerHTML += `
                    <div class="bg-slate-900 p-5 rounded-3xl border border-slate-800 flex justify-between items-center shadow-sm">
                        <div>
                            <h3 class="font-bold text-lg">${r.name}</h3>
                            <p class="text-slate-500 text-xs">${r.exercises.length} Exercises</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="startWorkout(${r.id})" class="bg-blue-600 p-2 px-5 rounded-xl text-sm font-bold">Start</button>
                            <button onclick="openEditModal(${r.id})" class="bg-slate-800 text-slate-300 p-2 px-5 rounded-xl text-sm font-bold">Edit</button>
                            <button onclick="deleteRoutine(${r.id})" class="bg-slate-800 text-red-400 p-2 px-5 rounded-xl text-sm">Delete</button>
                        </div>
                    </div>
                `;
            });
        }

        // --- ACTIVE WORKOUT LOGIC ---
        function startWorkout(id) {
            const routine = state.routines.find(r => r.id === id);
            currentRoutineId = id;
            document.getElementById('activeRoutineName').innerText = routine.name;
            
            sessionData = routine.exercises.map(ex => ({
                name: ex.name,
                sets: []
            }));

            renderActiveExercises();
            document.getElementById('activeWorkoutScreen').classList.remove('hidden');
            startTimer();
        }

        function renderActiveExercises() {
            const list = document.getElementById('activeExercisesList');
            list.innerHTML = '';
            
            sessionData.forEach((ex, exIdx) => {
                let setsHtml = '';
                ex.sets.forEach((set, setIdx) => {
                    setsHtml += `
                        <div class="grid grid-cols-3 gap-2 mb-2 items-center">
                            <span class="text-slate-500 text-xs font-bold uppercase">Set ${setIdx + 1}</span>
                            <input type="number" placeholder="Reps" oninput="updateSet(${exIdx}, ${setIdx}, 'reps', this.value)" value="${set.reps}" class="p-2 rounded-lg bg-slate-900 border border-slate-800 text-center text-sm outline-none focus:border-blue-500">
                            <input type="number" placeholder="kg" oninput="updateSet(${exIdx}, ${setIdx}, 'weight', this.value)" value="${set.weight}" class="p-2 rounded-lg bg-slate-900 border border-slate-800 text-center text-sm outline-none focus:border-blue-500">
                        </div>
                    `;
                });

                list.innerHTML += `
                    <div class="bg-slate-900 p-5 rounded-3xl border border-slate-800 shadow-lg">
                        <div class="flex justify-between items-center mb-4">
                            <h4 class="font-bold text-blue-400">${ex.name}</h4>
                            <button onclick="addSet(${exIdx})" class="bg-slate-800 text-xs font-bold px-3 py-1 rounded-lg border border-slate-700">+ Add Set</button>
                        </div>
                        <div class="space-y-1">${setsHtml || '<p class="text-slate-600 text-xs italic">No sets added yet</p>'}</div>
                    </div>
                `;
            });
        }

        function addSet(exIdx) {
            sessionData[exIdx].sets.push({ reps: '', weight: '' });
            renderActiveExercises();
        }

        function updateSet(exIdx, setIdx, field, value) {
            sessionData[exIdx].sets[setIdx][field] = value;
        }

        function startTimer() {
            secondsElapsed = 0;
            clearInterval(activeTimer);
            activeTimer = setInterval(() => {
                secondsElapsed++;
                const mins = Math.floor(secondsElapsed / 60).toString().padStart(2, '0');
                const secs = (secondsElapsed % 60).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `${mins}:${secs}`;
            }, 1000);
        }

        function finishWorkout() {
            clearInterval(activeTimer);
            
            state.logs.push({
                date: new Date().toISOString(),
                duration: secondsElapsed,
                routineId: currentRoutineId,
                data: sessionData
            });

            sessionData.forEach(ex => {
                const name = ex.name;
                if(!state.prs[name]) state.prs[name] = { weight: 0, reps: 0 };
                ex.sets.forEach(set => {
                    const w = parseFloat(set.weight) || 0;
                    const r = parseFloat(set.reps) || 0;
                    if(w > state.prs[name].weight) state.prs[name].weight = w;
                    if(r > state.prs[name].reps) state.prs[name].reps = r;
                });
            });

            saveData();
            document.getElementById('activeWorkoutScreen').classList.add('hidden');
            showTab('reports');
        }

        // --- REPORTS ---
        function renderReports() {
            const oneMonthAgo = new Date();
            oneMonthAgo.setDate(oneMonthAgo.getDate() - 30);
            
            const monthlySeconds = state.logs
                .filter(log => new Date(log.date) > oneMonthAgo)
                .reduce((acc, curr) => acc + curr.duration, 0);
            
            document.getElementById('totalTime').innerText = `${Math.floor(monthlySeconds / 60)}m`;

            const prList = document.getElementById('prList');
            prList.innerHTML = '';
            for(const [name, stats] of Object.entries(state.prs)) {
                prList.innerHTML += `
                    <div class="flex justify-between p-4 bg-slate-900 rounded-2xl border border-slate-800">
                        <span class="font-bold text-slate-300">${name}</span>
                        <span class="text-blue-500 font-black">${stats.weight}kg / ${stats.reps} reps</span>
                    </div>
                `;
            }
            if(Object.keys(state.prs).length === 0) {
                prList.innerHTML = '<p class="text-center text-slate-600 italic">No PRs recorded yet. Go lift!</p>';
            }
        }

        // App Start
        showTab('workout');
    </script>
</body>
</html>
